<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tool Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
  /* ============================================================
     GSIC TOOL TEMPLATE — shared shell
   Sticky full-width header + 260px sidebar grid + full-width content frame.
   Duplicate this _template/ folder to start a new tool.
     ============================================================ */
  :root{
  --accent:#149a49;
--secondary-purple:#4750a2;
--accent-gold:#eec61a;
  --accent-teal:#53c3c2;
--accent-orange:#f15922;
  --soft-cream:#fcf3cf;
  --soft-gray:#f4f5f7;
  --secondary-green:#e0f1d9;
  --warn-bg:#f8dcd3;
  --primary-blue:#dde0fe;
  --ink:#000;
--line:#e6e8ec;
  --line-dark:#cfd2d8;
  --shadow:0 4px 14px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
html,body{height:100%; background:#fff}
body{margin:0; color:var(--ink); overflow:hidden; display:flex; flex-direction:column; height:100vh; font-family:"Familjen Grotesk", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size:15px; line-height:1.4;}
header{flex-shrink:0; z-index:50; background:#fff; border-bottom:1px solid var(--line)}
.wrap{max-width:1500px; margin:0 auto; padding:14px 24px; display:flex; gap:14px; align-items:center; flex-wrap:wrap}
.brand-logo{display:flex; align-items:center; gap:10px}
.brand-mark{width:28px; height:28px; border-radius:6px; background:conic-gradient(from 90deg, var(--secondary-purple), var(--accent-teal), var(--accent-gold), var(--accent)); border:1px solid var(--line);}
.kicker{font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink)}
.controls{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap}
.btn{background:#fff; color:var(--ink); border:1px solid var(--line-dark); padding:9px 14px; font-weight:600; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;}
.btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
main{flex:1; min-height:0; max-width:1500px; width:100%; margin:0 auto; padding:16px 24px; display:grid; grid-template-columns:260px 1fr; gap:24px;}
main > section{min-width:0; min-height:0; display:flex; flex-direction:column}
aside{align-self:stretch; background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; overflow-y:auto;}
.nav{display:grid; gap:4px}
.nav button{width:100%; text-align:left; background:#fff; color:var(--ink); border:1px solid transparent; padding:10px 12px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:500;}
.nav button:hover{background:var(--secondary-green); color:var(--accent)}
.nav button.active{background:var(--secondary-green); color:var(--accent); font-weight:700; border-color:var(--accent)}
.content-frame{flex:1; min-height:0; overflow-y:auto; background:#fff; border:1px solid var(--line); border-radius:12px; padding:32px 36px;}
.section{display:none}
.section.active{display:block}
.section h1{font-size:28px; font-weight:800; color:var(--accent); margin:0 0 8px}
.subtitle{margin:0 0 24px; font-size:15px; color:var(--ink); max-width:780px}
@media(max-width:768px){main{grid-template-columns:1fr; padding:12px; gap:12px}}
</style>
  </head>
  <body>

  <!-- ===== Sticky header. Replace the kicker text with your tool's name. ===== -->
  <header>
  <div class="wrap">
  <div class="brand-logo">
  <div class="brand-mark" aria-hidden="true"></div>
  <div class="kicker">Tool Name Here</div>
</div>
<div class="controls">
<button class="btn primary">Action</button>
</div>
  </div>
  </header>

  <!-- ===== Main: 260px sidebar + full-width content frame ===== -->
<main>
<section>
<aside>
<nav class="nav">
<button data-target="overview" class="active">Overview</button>
  <button data-target="section-two">Section Two</button>
  <button data-target="section-three">Section Three</button>
  </nav>
  </aside>
  </section>

  <section>
  <div class="content-frame">
  <div class="section active" id="overview">
  <h1>Overview</h1>
  <p class="subtitle">Short description of this tool. Replace with your content.</p>
  <p>Body content goes here.</p>
  </div>
  <div class="section" id="section-two">
  <h1>Section Two</h1>
  <p class="subtitle">Description.</p>
  </div>
  <div class="section" id="section-three">
  <h1>Section Three</h1>
  <p class="subtitle">Description.</p>
  </div>
  </div>
  </section>
  </main>

  <!-- ===== Minimal nav: show one section at a time ===== -->
  <script>
  (function(){
  var buttons = document.querySelectorAll('.nav button');
var sections = document.querySelectorAll('.section');
buttons.forEach(function(btn){
  btn.addEventListener('click', function(){
    var target = btn.getAttribute('data-target');
buttons.forEach(function(b){ b.classList.remove('active'); });
sections.forEach(function(s){ s.classList.remove('active'); });
btn.classList.add('active');
var el = document.getElementById(target);
if(el){ el.classList.add('active'); }
  });
});
})();
</script>

  </body>
  </html>
