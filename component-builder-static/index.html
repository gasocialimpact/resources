<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Builder</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #tabs { margin: 20px 0; }
        .tab { display: inline-block; margin: 0 10px; cursor: pointer; padding: 10px; background: #e0e0e0; }
        .tab.active { background: #d0d0d0; }
        #content { border: 1px solid #ccc; padding: 20px; }
    </style>
</head>
<body>
    <h1>Component Builder</h1>
    <div id="tabs">
        <div class="tab active" data-tab="preview">Prompt Preview</div>
        <div class="tab" data-tab="source">Prompt Source</div>
        <div class="tab" data-tab="instructions">Instructions</div>
    </div>
    <div id="content">
        <div class="tab-content" id="preview-content">Preview Content...</div>
        <div class="tab-content hidden" id="source-content">Source Content...</div>
        <div class="tab-content hidden" id="instructions-content">Instructions Content...</div>
    </div>
    <button id="copy-prompt">Copy Prompt</button>
    <button id="download-prompt">Download Prompt (.txt)</button>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const previewContent = document.getElementById('preview-content');
        const sourceContent = document.getElementById('source-content');
        const instructionsContent = document.getElementById('instructions-content');

        tabs.forEach(tab => {
            tab.onclick = function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.getAttribute('data-tab');
                previewContent.classList.toggle('hidden', tabName !== 'preview');
                sourceContent.classList.toggle('hidden', tabName !== 'source');
                instructionsContent.classList.toggle('hidden', tabName !== 'instructions');
            };
        });

        document.getElementById('copy-prompt').onclick = function() {
            // Copy prompt logic
        };

        document.getElementById('download-prompt').onclick = function() {
            // Download prompt logic
        };
    </script>
</body>
</html>
