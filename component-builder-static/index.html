<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Builder</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <h1>Component Builder</h1>
    <div>
        <button onclick="copyPrompt()">Copy Prompt</button>
        <button onclick="downloadPrompt()" id="downloadBtn" disabled>Download Prompt (.txt)</button>
    </div>
    <div>
        <div>
            <button onclick="switchTab('preview')">Prompt Preview</button>
            <button onclick="switchTab('source')">Prompt Source</button>
            <button onclick="switchTab('instructions')">Instructions</button>
        </div>
        <div id="tab-content">
            <div id="preview" class="tab">...Preview of prompt...</div>
            <div id="source" class="tab" style="display:none;">...Source code...</div>
            <div id="instructions" class="tab" style="display:none;">Instructions on how to use...</div>
        </div>
    </div>
    <script type="text/babel">
        // React+Babel code here
        const App = () => {
            return (
                <div>
                    <h2>Welcome to the Component Builder!</h2>
                    {/* Additional React components go here */}
                </div>
            );
        };

        const renderTabContent = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
        };

        const switchTab = (tab) => {
            renderTabContent(tab);
        };

        const copyPrompt = () => {
            const promptText = "...Your prompt text...";
            navigator.clipboard.writeText(promptText);
            alert('Prompt copied to clipboard!');
            document.getElementById('downloadBtn').disabled = false; // Enable download
        };

        const downloadPrompt = () => {
            const blob = new Blob(["...Your prompt text..."]; , { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'prompt.txt';
            link.click();
        };

        ReactDOM.render(<App />, document.body);
    </script>
</body>
</html>
