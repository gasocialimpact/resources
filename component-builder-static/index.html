<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Builder</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { padding: 10px; border: 1px solid #ccc; cursor: pointer; margin-right: 2px; }
        .tab-content { border: 1px solid #ccc; padding: 20px; }
        textarea { width: 100%; height: 200px; }
        button { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Component Builder</h1>
    <div class="tabs">
        <div class="tab" id="preview-tab">Prompt Preview</div>
        <div class="tab" id="source-tab">Prompt Source</div>
        <div class="tab" id="instructions-tab">Instructions</div>
    </div>
    <div class="tab-content" id="tab-content"></div>
    <input type="hidden" id="componentType" value="default" />
    <textarea id="prompt" placeholder="Type your component prompt here..."></textarea>
    <button id="copyPrompt" disabled>Copy Prompt</button>
    <button id="downloadPrompt" disabled>Download Prompt (.txt)</button>

    <script>
        const previewTab = document.getElementById('preview-tab');
        const sourceTab = document.getElementById('source-tab');
        const instructionsTab = document.getElementById('instructions-tab');
        const tabContent = document.getElementById('tab-content');
        const promptTextarea = document.getElementById('prompt');
        const copyButton = document.getElementById('copyPrompt');
        const downloadButton = document.getElementById('downloadPrompt');

        let currentTab = 'preview';

        const updateTabContent = () => {
            if(currentTab === 'preview') {
                tabContent.innerHTML = `<h2>Prompt Preview</h2><pre>${promptTextarea.value}</pre>`;
            } else if(currentTab === 'source') {
                tabContent.innerHTML = `<h2>Prompt Source</h2><pre>${promptTextarea.value}</pre>`;
            } else if(currentTab === 'instructions') {
                tabContent.innerHTML = `<h2>Instructions</h2><p>Fill in the prompt, select component type, and click copy or download.</p>`;
            }
            checkButtons();
        };

        const checkButtons = () => {
            const promptExists = promptTextarea.value.trim() !== '';
            copyButton.disabled = !promptExists;
            downloadButton.disabled = !promptExists;
        };

        previewTab.onclick = () => { currentTab = 'preview'; updateTabContent(); };
        sourceTab.onclick = () => { currentTab = 'source'; updateTabContent(); };
        instructionsTab.onclick = () => { currentTab = 'instructions'; updateTabContent(); };

        copyButton.onclick = () => {
            navigator.clipboard.writeText(promptTextarea.value);
            alert('Prompt copied to clipboard!');
        };

        downloadButton.onclick = () => {
            const blob = new Blob([promptTextarea.value], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'prompt.txt';
            link.click();
        };

        updateTabContent();
    </script>
</body>
</html>
